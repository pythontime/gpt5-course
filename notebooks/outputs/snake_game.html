<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Serpent</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;700&display=swap");

    :root {
      --cyan: #00f5ff;
      --pink: #ff2bd6;
      --purple: #8a2bff;
      --yellow: #ffe66d;
      --bg: #050711;
      --panel: rgba(12, 16, 35, 0.72);
      --text: #dffcff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 43, 214, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0, 245, 255, 0.16), transparent 35%),
        linear-gradient(135deg, #03040a, #090d22 55%, #050711);
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.035) 0px,
        rgba(255,255,255,0.035) 1px,
        transparent 2px,
        transparent 6px
      );
      mix-blend-mode: overlay;
      opacity: 0.22;
      animation: scan 7s linear infinite;
    }

    @keyframes scan {
      from { transform: translateY(-20px); }
      to { transform: translateY(20px); }
    }

    .shell {
      width: min(94vw, 820px);
      padding: 22px;
      border: 1px solid rgba(0, 245, 255, 0.35);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(10, 14, 34, 0.86), rgba(7, 8, 18, 0.82));
      box-shadow:
        0 0 35px rgba(0, 245, 255, 0.16),
        0 0 80px rgba(255, 43, 214, 0.12),
        inset 0 0 30px rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      position: relative;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      width: 54px;
      height: 54px;
      border-color: var(--cyan);
      opacity: 0.8;
      pointer-events: none;
    }

    .shell::before {
      top: 12px;
      left: 12px;
      border-top: 2px solid;
      border-left: 2px solid;
      border-radius: 18px 0 0 0;
    }

    .shell::after {
      bottom: 12px;
      right: 12px;
      border-bottom: 2px solid;
      border-right: 2px solid;
      border-radius: 0 0 18px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(2rem, 7vw, 4.5rem);
      line-height: 0.92;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: transparent;
      background: linear-gradient(90deg, var(--cyan), #fff, var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 0 14px rgba(0, 245, 255, 0.55),
        0 0 28px rgba(255, 43, 214, 0.35);
    }

    .subtitle {
      margin-top: 8px;
      color: rgba(223, 252, 255, 0.72);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(88px, 1fr));
      gap: 10px;
      min-width: 210px;
    }

    .stat {
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--panel);
      border-radius: 14px;
      box-shadow: inset 0 0 18px rgba(0, 245, 255, 0.05);
    }

    .label {
      display: block;
      color: rgba(223, 252, 255, 0.56);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.72rem;
    }

    .value {
      font-family: "Orbitron", sans-serif;
      font-weight: 700;
      font-size: 1.35rem;
      color: #fff;
      text-shadow: 0 0 10px rgba(0,245,255,0.5);
    }

    .game-wrap {
      display: grid;
      grid-template-columns: 1fr 190px;
      gap: 16px;
      align-items: stretch;
    }

    .arena {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      padding: 10px;
      background:
        linear-gradient(135deg, rgba(0, 245, 255, 0.35), rgba(255, 43, 214, 0.2)),
        rgba(255,255,255,0.04);
      box-shadow:
        0 0 22px rgba(0, 245, 255, 0.25),
        0 0 42px rgba(255, 43, 214, 0.16);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 16px;
      background: #050711;
      box-shadow: inset 0 0 35px rgba(0,0,0,0.8);
    }

    .overlay {
      position: absolute;
      inset: 10px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: rgba(3, 4, 10, 0.46);
      text-align: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-family: "Orbitron", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: clamp(1.5rem, 4vw, 3rem);
      color: white;
      text-shadow:
        0 0 12px var(--cyan),
        0 0 28px var(--pink);
    }

    .overlay p {
      max-width: 420px;
      margin: 0 auto 18px;
      color: rgba(223,252,255,0.78);
      font-size: 1.1rem;
    }

    aside {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: inset 0 0 24px rgba(0, 245, 255, 0.04);
    }

    .panel h3 {
      margin: 0 0 10px;
      font-family: "Orbitron", sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .controls {
      margin: 0;
      padding-left: 18px;
      color: rgba(223,252,255,0.76);
      line-height: 1.45;
    }

    .btn {
      width: 100%;
      border: 1px solid rgba(0,245,255,0.6);
      border-radius: 14px;
      padding: 12px 14px;
      color: white;
      background:
        linear-gradient(90deg, rgba(0,245,255,0.18), rgba(255,43,214,0.18)),
        rgba(255,255,255,0.05);
      font-family: "Orbitron", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      cursor: pointer;
      box-shadow:
        0 0 14px rgba(0,245,255,0.18),
        inset 0 0 18px rgba(255,255,255,0.03);
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--pink);
      box-shadow:
        0 0 18px rgba(255,43,214,0.24),
        0 0 28px rgba(0,245,255,0.18);
    }

    .status {
      font-family: "Orbitron", sans-serif;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
      text-shadow: 0 0 8px rgba(255,230,109,0.4);
    }

    @media (max-width: 780px) {
      header {
        display: block;
      }

      .stats {
        margin-top: 14px;
      }

      .game-wrap {
        grid-template-columns: 1fr;
      }

      aside {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 520px) {
      .shell {
        padding: 14px;
      }

      aside {
        grid-template-columns: 1fr;
      }

      .subtitle {
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <header>
      <div>
        <h1>Neon<br>Serpent</h1>
        <div class="subtitle">Cyberpunk Snake Protocol</div>
      </div>

      <section class="stats">
        <div class="stat">
          <span class="label">Score</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="label">Best</span>
          <span class="value" id="best">0</span>
        </div>
      </section>
    </header>

    <section class="game-wrap">
      <div class="arena">
        <canvas id="game" width="600" height="600"></canvas>

        <div class="overlay show" id="overlay">
          <div>
            <h2 id="overlayTitle">Initialize</h2>
            <p id="overlayText">
              Use arrow keys or WASD to pilot the serpent. Consume neon data cores. Avoid walls and yourself.
            </p>
            <button class="btn" id="overlayBtn">Start Run</button>
          </div>
        </div>
      </div>

      <aside>
        <div class="panel">
          <h3>Controls</h3>
          <ul class="controls">
            <li>Move: Arrow Keys / WASD</li>
            <li>Pause: Space</li>
            <li>Restart: Enter</li>
          </ul>
        </div>

        <div class="panel">
          <h3>System</h3>
          <p class="status" id="status">Awaiting input</p>
        </div>

        <button class="btn" id="startBtn">Start / Restart</button>
        <button class="btn" id="pauseBtn">Pause</button>
      </aside>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const statusEl = document.getElementById("status");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const overlayBtn = document.getElementById("overlayBtn");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");

    const GRID = 30;
    const SIZE = canvas.width / GRID;

    let snake;
    let food;
    let dir;
    let nextDir;
    let score;
    let best = Number(localStorage.getItem("neon-serpent-best") || 0);
    let running = false;
    let paused = false;
    let gameOver = false;
    let moveDelay = 118;
    let accumulator = 0;
    let lastTime = 0;
    let particles = [];

    bestEl.textContent = best;

    function resetGame() {
      snake = [
        { x: 15, y: 15 },
        { x: 14, y: 15 },
        { x: 13, y: 15 }
      ];

      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      moveDelay = 118;
      particles = [];
      food = spawnFood();

      scoreEl.textContent = score;
      statusEl.textContent = "Run active";
      running = true;
      paused = false;
      gameOver = false;
      hideOverlay();
    }

    function spawnFood() {
      let point;

      do {
        point = {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID)
        };
      } while (snake.some(segment => segment.x === point.x && segment.y === point.y));

      return point;
    }

    function setDirection(x, y) {
      if (!running || paused) return;

      const isOpposite = nextDir.x === -x && nextDir.y === -y;
      if (!isOpposite) {
        dir = { x, y };
      }
    }

    function step() {
      nextDir = dir;

      const head = snake[0];
      const newHead = {
        x: head.x + nextDir.x,
        y: head.y + nextDir.y
      };

      const hitWall =
        newHead.x < 0 ||
        newHead.x >= GRID ||
        newHead.y < 0 ||
        newHead.y >= GRID;

      const hitSelf = snake.some(segment => segment.x === newHead.x && segment.y === newHead.y);

      if (hitWall || hitSelf) {
        endGame();
        return;
      }

      snake.unshift(newHead);

      const ateFood = newHead.x === food.x && newHead.y === food.y;

      if (ateFood) {
        score += 10;
        scoreEl.textContent = score;

        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem("neon-serpent-best", best);
        }

        moveDelay = Math.max(56, moveDelay - 3.2);
        burst(food.x, food.y);
        food = spawnFood();
      } else {
        snake.pop();
      }
    }

    function endGame() {
      running = false;
      gameOver = true;
      statusEl.textContent = "Connection severed";

      overlayTitle.textContent = "Run Terminated";
      overlayText.textContent = `Final score: ${score}. Press Enter or tap reboot to jack in again.`;
      overlayBtn.textContent = "Reboot";
      showOverlay();
    }

    function togglePause() {
      if (!running || gameOver) return;

      paused = !paused;
      statusEl.textContent = paused ? "Paused" : "Run active";

      if (paused) {
        overlayTitle.textContent = "Paused";
        overlayText.textContent = "The neon grid is frozen. Press Space to resume.";
        overlayBtn.textContent = "Resume";
        showOverlay();
      } else {
        hideOverlay();
      }
    }

    function showOverlay() {
      overlay.classList.add("show");
    }

    function hideOverlay() {
      overlay.classList.remove("show");
    }

    function burst(x, y) {
      const cx = x * SIZE + SIZE / 2;
      const cy = y * SIZE + SIZE / 2;

      for (let i = 0; i < 22; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.2 + Math.random() * 3.6;

        particles.push({
          x: cx,
          y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 28 + Math.random() * 18,
          color: Math.random() > 0.5 ? "#00f5ff" : "#ff2bd6"
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => p.life > 0);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.life--;
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bg = ctx.createRadialGradient(300, 300, 20, 300, 300, 440);
      bg.addColorStop(0, "#111a3b");
      bg.addColorStop(0.5, "#070a1c");
      bg.addColorStop(1, "#02030a");

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.strokeStyle = "rgba(0,245,255,0.09)";
      ctx.lineWidth = 1;

      for (let i = 0; i <= GRID; i++) {
        const pos = i * SIZE;

        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }

      ctx.restore();

      ctx.save();
      ctx.strokeStyle = "rgba(255,43,214,0.18)";
      ctx.lineWidth = 3;
      ctx.shadowColor = "#ff2bd6";
      ctx.shadowBlur = 18;
      ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
      ctx.restore();
    }

    function drawFood() {
      const cx = food.x * SIZE + SIZE / 2;
      const cy = food.y * SIZE + SIZE / 2;
      const pulse = Math.sin(performance.now() / 120) * 2;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.PI / 4);

      ctx.shadowColor = "#ffe66d";
      ctx.shadowBlur = 24;
      ctx.fillStyle = "#ffe66d";
      ctx.fillRect(-6 - pulse, -6 - pulse, 12 + pulse * 2, 12 + pulse * 2);

      ctx.shadowColor = "#ff2bd6";
      ctx.shadowBlur = 18;
      ctx.strokeStyle = "#ff2bd6";
      ctx.lineWidth = 2;
      ctx.strokeRect(-10 - pulse, -10 - pulse, 20 + pulse * 2, 20 + pulse * 2);

      ctx.restore();
    }

    function drawSnake() {
      for (let i = snake.length - 1; i >= 0; i--) {
        const s = snake[i];
        const pad = i === 0 ? 2 : 3.4;
        const x = s.x * SIZE + pad;
        const y = s.y * SIZE + pad;
        const w = SIZE - pad * 2;
        const h = SIZE - pad * 2;

        const isHead = i === 0;
        const gradient = ctx.createLinearGradient(x, y, x + w, y + h);

        if (isHead) {
          gradient.addColorStop(0, "#ffffff");
          gradient.addColorStop(0.45, "#00f5ff");
          gradient.addColorStop(1, "#8a2bff");
          ctx.shadowColor = "#00f5ff";
          ctx.shadowBlur = 22;
        } else {
          gradient.addColorStop(0, "#00f5ff");
          gradient.addColorStop(0.5, "#8a2bff");
          gradient.addColorStop(1, "#ff2bd6");
          ctx.shadowColor = i % 2 ? "#ff2bd6" : "#00f5ff";
          ctx.shadowBlur = 14;
        }

        ctx.fillStyle = gradient;
        roundRect(x, y, w, h, 6);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.lineWidth = 1;
        roundRect(x + 1, y + 1, w - 2, h - 2, 5);
        ctx.stroke();
      }

      drawEyes();
    }

    function drawEyes() {
      const head = snake[0];
      if (!head) return;

      const cx = head.x * SIZE + SIZE / 2;
      const cy = head.y * SIZE + SIZE / 2;

      const eyeOffsetX = nextDir.y !== 0 ? 5 : nextDir.x * 4;
      const eyeOffsetY = nextDir.x !== 0 ? 5 : nextDir.y * 4;

      ctx.save();
      ctx.fillStyle = "#02030a";
      ctx.shadowColor = "#ffffff";
      ctx.shadowBlur = 8;

      if (nextDir.x !== 0) {
        ctx.beginPath();
        ctx.arc(cx + nextDir.x * 4, cy - 5, 2.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx + nextDir.x * 4, cy + 5, 2.4, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(cx - 5, cy + nextDir.y * 4, 2.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx + 5, cy + nextDir.y * 4, 2.4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / 42);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function draw() {
      drawBackground();
      drawFood();
      drawParticles();
      drawSnake();
    }

    function loop(time) {
      const delta = time - lastTime;
      lastTime = time;

      if (running && !paused) {
        accumulator += delta;

        while (accumulator >= moveDelay) {
          step();
          accumulator -= moveDelay;
        }
      }

      updateParticles();
      draw();

      requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") setDirection(0, -1);
      if (key === "arrowdown" || key === "s") setDirection(0, 1);
      if (key === "arrowleft" || key === "a") setDirection(-1, 0);
      if (key === "arrowright" || key === "d") setDirection(1, 0);

      if (key === " ") {
        if (!running) resetGame();
        else togglePause();
      }

      if (key === "enter") resetGame();
    });

    overlayBtn.addEventListener("click", () => {
      if (paused) togglePause();
      else resetGame();
    });

    startBtn.addEventListener("click", resetGame);
    pauseBtn.addEventListener("click", togglePause);

    snake = [
      { x: 15, y: 15 },
      { x: 14, y: 15 },
      { x: 13, y: 15 }
    ];

    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    food = { x: 20, y: 15 };

    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
