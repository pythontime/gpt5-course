<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pricing Card</title>
  <style>
    :root {
      --color-primary: #4F46E5;
      --color-surface: #0B1020;
      --radius-md: 12px;
      --spacing-base: 8px;
      --font-heading: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: calc(var(--spacing-base) * 3);
      background: var(--color-surface);
      font-family: var(--font-heading);
      color: #ffffff;
    }

    .pricing-card {
      width: min(100%, 360px);
      padding: calc(var(--spacing-base) * 4);
      border: 1px solid var(--color-primary);
      border-radius: var(--radius-md);
      background: var(--color-surface);
    }

    .pricing-card__title {
      margin: 0 0 calc(var(--spacing-base) * 2);
      font-size: 1.5rem;
      line-height: 1.2;
      font-weight: 700;
    }

    .pricing-card__price {
      margin: 0 0 calc(var(--spacing-base) * 3);
      display: flex;
      align-items: baseline;
      gap: var(--spacing-base);
    }

    .pricing-card__amount {
      font-size: 3rem;
      line-height: 1;
      font-weight: 800;
    }

    .pricing-card__period {
      font-size: 1rem;
      line-height: 1.5;
    }

    .pricing-card__features {
      margin: 0 0 calc(var(--spacing-base) * 4);
      padding: 0;
      list-style: none;
      display: grid;
      gap: calc(var(--spacing-base) * 2);
    }

    .pricing-card__feature {
      display: flex;
      gap: var(--spacing-base);
      align-items: flex-start;
      line-height: 1.5;
    }

    .pricing-card__feature::before {
      content: "✓";
      color: var(--color-primary);
      font-weight: 700;
      flex: 0 0 auto;
    }

    .pricing-card__cta {
      width: 100%;
      min-height: calc(var(--spacing-base) * 6);
      padding: calc(var(--spacing-base) * 1.5) calc(var(--spacing-base) * 3);
      border: 0;
      border-radius: var(--radius-md);
      background: var(--color-primary);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .pricing-card__cta:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: calc(var(--spacing-base) / 2);
    }
  </style>
</head>
<body>
  <main>
    <article class="pricing-card" aria-labelledby="pricing-card-title">
      <h1 class="pricing-card__title" id="pricing-card-title">Pro Plan</h1>

      <p class="pricing-card__price" aria-label="$29 per month">
        <span class="pricing-card__amount">$29</span>
        <span class="pricing-card__period">/ month</span>
      </p>

      <ul class="pricing-card__features" aria-label="Included features">
        <li class="pricing-card__feature">Unlimited projects</li>
        <li class="pricing-card__feature">Advanced analytics</li>
        <li class="pricing-card__feature">Priority support</li>
        <li class="pricing-card__feature">Team collaboration</li>
      </ul>

      <button class="pricing-card__cta" type="button" aria-label="Start Pro Plan">
        Start now
      </button>
    </article>
  </main>
</body>
</html>
