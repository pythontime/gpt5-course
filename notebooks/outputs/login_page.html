<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Chat Completions API</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 46px 92px;
    }

    /* Navigation */
    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 58px;
      margin-bottom: 90px;
    }

    .nav a {
      font-size: 34px;
      font-weight: 400;
      color: #f5f5f5;
      opacity: 0.95;
      padding: 24px 40px;
      border-radius: 999px;
      transition: background 0.2s ease, opacity 0.2s ease;
    }

    .nav a:hover {
      background: #161616;
    }

    .nav .active {
      background: #1f1f1f;
    }

    /* Layout */
    .content {
      flex: 1;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 90px;
      align-items: center;
    }

    .copy {
      max-width: 760px;
    }

    .copy h1 {
      font-size: clamp(56px, 5vw, 86px);
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: -0.04em;
      margin-bottom: 54px;
    }

    .copy p {
      font-size: clamp(28px, 2.5vw, 43px);
      line-height: 1.6;
      font-weight: 400;
      color: #f4f4f4;
      margin-bottom: 84px;
    }

    .copy .link {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 34px;
      color: #fff;
    }

    .copy .link span {
      font-size: 46px;
      line-height: 1;
      transform: translateY(-1px);
    }

    /* Right visual area */
    .login-visual {
      min-height: 760px;
      border-radius: 14px;
      padding: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(92, 196, 255, 0.95), transparent 34%),
        radial-gradient(circle at 80% 10%, rgba(120, 172, 255, 0.9), transparent 38%),
        radial-gradient(circle at 60% 80%, rgba(180, 232, 255, 0.9), transparent 42%),
        linear-gradient(135deg, #0797ea 0%, #68b8ff 45%, #c7f6ff 100%);
    }

    .login-visual::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.25) 35%, transparent 50%),
        linear-gradient(30deg, transparent 30%, rgba(255,255,255,0.18) 45%, transparent 60%);
      filter: blur(18px);
      opacity: 0.9;
      transform: rotate(-8deg);
    }

    /* Login card */
    .login-card {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
      background: rgba(8, 8, 8, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 46px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(24px);
    }

    .login-card h2 {
      font-size: 42px;
      font-weight: 400;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }

    .login-card .subtitle {
      font-size: 18px;
      color: #b8b8b8;
      line-height: 1.5;
      margin-bottom: 34px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 15px;
      color: #d8d8d8;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      height: 58px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: #111;
      color: #fff;
      font-size: 17px;
      padding: 0 18px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input::placeholder {
      color: #777;
    }

    input:focus {
      border-color: rgba(87, 181, 255, 0.9);
      box-shadow: 0 0 0 4px rgba(87, 181, 255, 0.16);
      background: #141414;
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 8px 0 28px;
      font-size: 15px;
      color: #cfcfcf;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .remember input {
      width: 17px;
      height: 17px;
      accent-color: #2ea7ff;
    }

    .forgot {
      color: #9ed8ff;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      height: 60px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #000;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #8e8e8e;
      font-size: 14px;
      margin: 28px 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
    }

    .secondary-btn {
      width: 100%;
      height: 58px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: #151515;
      color: #fff;
      font-size: 17px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .secondary-btn:hover {
      background: #202020;
      border-color: rgba(255, 255, 255, 0.28);
    }

    .signup {
      margin-top: 28px;
      text-align: center;
      color: #b8b8b8;
      font-size: 16px;
    }

    .signup a {
      color: #9ed8ff;
    }

    .signup a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .page {
        padding: 36px 42px;
      }

      .nav {
        gap: 18px;
        margin-bottom: 60px;
        flex-wrap: wrap;
      }

      .nav a {
        font-size: 22px;
        padding: 16px 24px;
      }

      .content {
        grid-template-columns: 1fr;
        gap: 48px;
      }

      .copy {
        max-width: none;
      }

      .login-visual {
        min-height: 620px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 24px 18px;
      }

      .nav {
        justify-content: flex-start;
        gap: 10px;
        margin-bottom: 48px;
      }

      .nav a {
        font-size: 16px;
        padding: 12px 16px;
      }

      .copy h1 {
        font-size: 48px;
      }

      .copy p {
        font-size: 24px;
        margin-bottom: 42px;
      }

      .copy .link {
        font-size: 24px;
      }

      .login-visual {
        min-height: auto;
        padding: 22px;
      }

      .login-card {
        padding: 28px;
        border-radius: 20px;
      }

      .login-card h2 {
        font-size: 34px;
      }

      .form-row {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <nav class="nav" aria-label="Primary navigation">
      <a href="#">Responses API</a>
      <a href="#" class="active">Chat Completions API</a>
      <a href="#">Realtime API</a>
      <a href="#">Batch API</a>
    </nav>

    <section class="content">
      <div class="copy">
        <h1>Welcome back</h1>
        <p>
          Sign in to access your API dashboard, manage keys,
          and build with our most powerful models.
        </p>

        <a href="#" class="link">
          Learn more <span>›</span>
        </a>
      </div>

      <div class="login-visual">
        <form class="login-card">
          <h2>Log in</h2>
          <p class="subtitle">
            Continue to your developer workspace.
          </p>

          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="form-row">
            <label class="remember">
              <input type="checkbox" name="remember" />
              Remember me
            </label>

            <a href="#" class="forgot">Forgot password?</a>
          </div>

          <button type="submit" class="btn">Log in</button>

          <div class="divider">or</div>

          <button type="button" class="secondary-btn">
            Continue with GitHub
          </button>

          <p class="signup">
            Don’t have an account?
            <a href="#">Create one</a>
          </p>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
