    # Conversations API — State Without the Plumbing

    --

    **Before (legacy):** manual `previous_response_id` chaining

    ```python
    r1 = client.responses.create(model="gpt-5.5", input="tell me a joke")
    r2 = client.responses.create(
        model="gpt-5.5",
        previous_response_id=r1.id,                 # chain by hand
        input="explain why this is funny",
    )
    ```

    --

    **After (current):** a durable conversation object

    ```python
    convo = client.conversations.create()           # persistent ID
    client.responses.create(
        model="gpt-5.5",
        conversation=convo.id,
        store=True,                                  # persists indefinitely
        input="tell me a joke",
    )
    ```

    --

    - **Server-side compaction** — `/responses/compact` (also inline via `context_management` / `compact_threshold`) shrinks the context you send each turn
    - **`phase` parameter** — labels messages `commentary` (in-progress narration) vs `final_answer` (the deliverable)

    .footnote[Source: https://developers.openai.com/api/docs/guides/conversation-state · https://developers.openai.com/api/docs/changelog]

    # Agents SDK

    # The 7 Agents SDK Primitives

    --

    - **Agent** — the LLM config: instructions + tools; plans, calls tools, keeps state

    --

    - **Runner** — executes the agent loop; manages streaming, state, result handling

    --

    - **Tools** — function tools (`@function_tool`), hosted tools, and MCP servers

    --

    - **Handoffs** — delegate to specialist agents; you control which agent replies

    --

    - **Guardrails** — input/output validation; pause/block risky ops, add human review

    --

    - **Sessions** — automatic conversation-history management, resumable across turns

    --

    - **Tracing** — built-in run tracking to view, debug, and optimize workflows

    .footnote[Source: [openai-agents-python](https://github.com/openai/openai-agents-python) · [Agents guide](https://developers.openai.com/api/docs/guides/agents)]

    ---

    # Agents SDK — Minimal Example

    ## Define an Agent, run it with streaming

    ```python
    from agents import Agent, Runner

    agent = Agent(
        name="Assistant",
        model="gpt-5.5",
        instructions="Help users with their tasks",
    )

    result = Runner.run_streamed(agent, "Summarize today's standup notes")
    async for event in result.stream_events():
        print(event)
    ```

    .footnote[Source: [openai-agents-python](https://github.com/openai/openai-agents-python)]

    ---

    # Agents SDK — Handoffs

    ## Triage agent delegates to a specialist

    ```python
    from agents import Agent, Runner

    refunds = Agent(
        name="Refunds Specialist",
        model="gpt-5.5",
        instructions="Handle refund requests end to end.",
    )

    triage = Agent(
        name="Triage",
        model="gpt-5.4-mini",
        instructions="Route the user. Hand off refund issues to the specialist.",
        handoffs=[refunds],            # explicit delegation
    )

    result = Runner.run_sync(triage, "I want a refund for order #4821")
    print(result.final_output)
    ```

    .footnote[Source: [openai-agents-python](https://github.com/openai/openai-agents-python) · [Agents guide](https://developers.openai.com/api/docs/guides/agents)]

    # What's New: GPT-5.2 Prompting Deltas (1/3)

    ## `output_verbosity_spec`

    --

    **What it is:** the original guide had a single coarse `verbosity` API knob (low/medium/high). GPT-5.2 replaces it with an explicit, **in-prompt verbosity contract**.

    --

    **Example:**

    ```text
    <output_verbosity_spec>
      Default: 3–6 sentences OR ≤5 bullets for typical answers.
      Break responses into digestible chunks.
      Avoid long narrative paragraphs.
    </output_verbosity_spec>
    ```

    .footnote[Source: [GPT-5.2 Prompting Guide](https://developers.openai.com/cookbook/examples/gpt-5/gpt-5-2_prompting_guide)]

    ---

    # What's New: GPT-5.2 Prompting Deltas (2/3)

    ## Scope Discipline

    --

    **What it is:** a dedicated guardrail that counters GPT-5.2's tendency to produce **more** code/features than the minimal spec.

    --

    **Example:**

    ```text
    <scope_discipline>
      Implement EXACTLY and ONLY what the user requests.
      No extra features, no added components, no UX embellishments.
    </scope_discipline>
    ```

    .footnote[Source: [GPT-5.2 Prompting Guide](https://developers.openai.com/cookbook/examples/gpt-5/gpt-5-2_prompting_guide)]

    ---

    # What's New: GPT-5.2 Prompting Deltas (3/3)

    ## Long-context Re-grounding + Uncertainty Self-checks

    --

    **Long-context re-grounding** — for inputs >~10k tokens:
    - Produce a short internal outline
    - Re-state the user's constraints explicitly before answering
    - Anchor claims to specific sections

    --

    **Uncertainty self-checks** — in high-risk domains, prompt the model to flag, before finalizing:
    - Unstated assumptions
    - Specific numbers or claims not grounded in the input
    - Overly strong language

    .footnote[Source: [GPT-5.2 Prompting Guide](https://developers.openai.com/cookbook/examples/gpt-5/gpt-5-2_prompting_guide)]

    # Controlling Agentic Eagerness

    ## Less Agentic Eagerness

    --

    **Reduce Context Gathering & Exploration:**

    ```python
    # Set reasoning_effort to lower
    reasoning_effort = "minimal"  # Improves efficiency, reduces latency
    ```

    --

    **Specify Clear Exploration Criteria:**

    ```xml
    <context_gathering>
      Goal: Find the specific function definition
      Method: Search only in src/ directory
      Stop: When function is found or after 2 searches
    </context_gathering>
    ```

    --

    **Benefits:**
    - Faster response times
    - More predictable behavior
    - Lower token usage

    ---

    # Controlling Agentic Eagerness

    ## More Agentic Eagerness

    --

    **Encourage Persistence:**

    ```xml
    <persistence>
      Continue exploring until the task is fully complete.
      Do not stop at partial solutions.
      Verify all edge cases before concluding.
    </persistence>
    ```

    --

    **Increase Reasoning Depth:**

    ```python
    reasoning_effort = "high"  # Default is "medium"
    ```

    --

    **Tool Preambles for Progress Updates:**
    - Thorough descriptions of each step
    - Continuous user updates on task progress
    - Detailed explanations of decision-making

    # Enhanced Code Generation Techniques

    ## Self-Reflection & Structured Guidance

    ### **Strict Design Standards Adherence:**
    ```xml
      <ui_ux_best_practices>
      - Visual Hierarchy: Limit typography to 4–5 font sizes and weights for consistent hierarchy; use `text-xs` for captions and annotations; avoid `text-xl` unless for hero or major headings.
      - Color Usage: Use 1 neutral base (e.g., `zinc`) and up to 2 accent colors. 
      - Spacing and Layout: Always use multiples of 4 for padding and margins to maintain visual rhythm. Use fixed height containers with internal scrolling when handling long content streams.
      - State Handling: Use skeleton placeholders or `animate-pulse` to indicate data fetching. Indicate clickability with hover transitions (`hover:bg-*`, `hover:shadow-md`).
      - Accessibility: Use semantic HTML and ARIA roles where appropriate. Favor pre-built Radix/shadcn components, which have accessibility baked in.
      </ui_ux_best_practices>
    ```

    # Recommended Prompting Patterns

    --

    **1. Brief Thought Process Summary**
    ```markdown
    "Start your response with 2-3 bullet points summarizing
    your reasoning approach before the full answer"
    ```

    --

    **2. Thorough Tool-Calling Preambles**
    ```markdown
    "Before each tool use, explain: what you're doing,
    why, and what you expect to find"
    ```

    --

    **3. Disambiguated Tool Instructions**
    ```markdown
    "Search for 'class UserAuth' in authentication files only,
    stop after finding the implementation, not just imports"
    ```

    **4. Planned Execution at Minimal Reasoning**
    ```markdown
    "First, outline your approach in 3 steps.
    Then execute each step completely before moving on."
    ```

    # Markdown Formatting & Output Control

    ## Professional Output Formatting

    --

    ### **Semantic Markdown Usage:**
    ```markdown
    Use Markdown **only where semantically correct**:
    - `inline code` for functions, variables
    - ```code fences``` for code blocks
    - Lists and tables for structured data
    - \( and \) for inline math
    - \[ and \] for block math
    ```

    # Metaprompting Techniques

    ## Teaching GPT-5 to Optimize Itself

    --

    ### **The Metaprompt Pattern:**

    ```text
    When asked to optimize prompts, give answers from your own
    perspective - explain what specific phrases could be added to,
    or deleted from, this prompt to more consistently elicit the
    desired behavior or prevent the undesired behavior.

    Here's a prompt: [PROMPT]

    The desired behavior is: [DO DESIRED BEHAVIOR]
    But instead it: [DOES UNDESIRED BEHAVIOR]

    While keeping the existing prompt intact as much as possible,
    what minimal edits/additions would you make to encourage
    more consistent desired behavior?
    ```

    .footnote[Source: [GPT-5 Prompting Guide - Metaprompting](https://cookbook.openai.com/examples/gpt-5/gpt-5_prompting_guide#metaprompting)]
